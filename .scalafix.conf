rules = [
  OrganizeImports
  DisableSyntax,
  NoValInForComprehension,
  ProcedureSyntax,
  RedundantSyntax,
  RemoveUnused
]
DisableSyntax.noVars = true
DisableSyntax.noThrows = true
DisableSyntax.noNulls = true
DisableSyntax.noReturns = true
DisableSyntax.noWhileLoops = true
DisableSyntax.noAsInstanceOf = true
DisableSyntax.noIsInstanceOf = true
DisableSyntax.noXml = true
DisableSyntax.noDefaultArgs = true
DisableSyntax.noFinalVal = true
DisableSyntax.noFinalize = true
DisableSyntax.noValPatterns = true
DisableSyntax.noUniversalEquality = true

triggered.rules = [
  DisableSyntax
]

OrganizeImports {
  blankLines = Auto
  coalesceToWildcardImportThreshold = null
  expandRelative = true
  groupExplicitlyImportedImplicitsSeparately = false
  groupedImports = AggressiveMerge
  groups = [
    "re:javax?\\."
    "scala."
    "*"
  ]
  # Keep within-import selector order untouched — scalafmt's `Imports` rewrite owns it (lowercase-first).
  # Forcing Ascii here conflicts with scalafmt when an import mixes camelCase values and PascalCase types
  # (e.g. `import zio.test.{TestEnvironment, testEnvironment}`). `importsOrder` (statement-level) is unaffected.
  importSelectorsOrder = Keep
  importsOrder = Ascii
  preset = DEFAULT
  removeUnused = true
}
