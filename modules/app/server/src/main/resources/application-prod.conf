# Prod-env config for the `server` deployment unit. Committed (no secrets in this file).
#
# Secrets are injected at deploy time via env-var substitution: `${VAR}` (no `?`),
# which fails fast at boot if the var isn't set. This file documents the shape
# the deployment env must satisfy.

server {
  host = "0.0.0.0"
  port = 8080
}

logging {
  format = "json"
  level  = "info"
}

otel {
  service-name  = "scala-zio-example"
  otlp-endpoint = ${OTEL_ENDPOINT}
}

database.data-source {
  jdbc-url          = ${MYSQL_URL}
  user              = ${MYSQL_USER}
  password          = ${MYSQL_PASSWORD}
  maximum-pool-size = 50
}
