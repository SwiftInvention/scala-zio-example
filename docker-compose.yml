networks:
  localNetwork:
    name: scala-zio-example-local

services:
  # Built by `just docker-build` (sbt appServer/Docker/publishLocal).
  # Runs the image with `APP_ENV=dev` and the `${VAR}` substitutions filled
  # from this `environment:` block — same shape as a real dev deployment,
  # different values. No `application-docker.conf` exists; compose-local is
  # an instantiation of the dev shape, not a separate environment.
  server:
    image: scala-zio-example-server:latest
    networks:
      - localNetwork
    ports:
      - "8080:8080"
    environment:
      APP_ENV: dev
      MYSQL_URL: "jdbc:mysql://mysql:3306/localDatabase?useUnicode=true&serverTimezone=UTC"
      MYSQL_USER: "localUser"
      MYSQL_PASSWORD: "localPassword"
      OTEL_ENDPOINT: "http://jaeger:4318/v1/traces"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "1", "http://localhost:8080/health"]
      interval: 1s
      start_period: 5s
      retries: 60
    depends_on:
      mysql:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    networks:
      - localNetwork
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: 'localDatabase'
      MYSQL_USER: 'localUser'
      MYSQL_PASSWORD: 'localPassword'

      # Note: mySQL won't run without root password being set.
      # Though there are other root password options, the `MYSQL_ROOT_PASSWORD` is the most explicit.
      MYSQL_ROOT_PASSWORD: 'localPassword'

    healthcheck:
      test: mysql -h localhost -P 3306 --protocol=tcp -u $$MYSQL_USER --password=$$MYSQL_PASSWORD $$MYSQL_DATABASE -e 'SELECT 1'
      interval: 3s
      retries: 500
    command: ['mysqld', '--character-set-server=utf8', '--collation-server=utf8_general_ci']

  # Jaeger all-in-one — local OTEL collector + UI.
  # Receives OTLP HTTP traces on :4318, exposes the UI at http://localhost:16686.
  # `just local-infra-up` starts this alongside MySQL; the server's `application-local.conf` points its OTLP endpoint at port 4318.
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    networks:
      - localNetwork
    ports:
      - "4318:4318"   # OTLP HTTP traces
      - "16686:16686" # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 3s
      retries: 60

